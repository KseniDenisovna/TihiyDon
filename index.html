<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест по роману «Тихий Дон»</title>
    <style>
        /* Базовый стиль */
        :root {
            --primary-color: #2C3E50;
            --accent-color: #FFAA00;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .quiz-container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: white;
        }

        .progress-bar {
            position: relative;
            width: 100%;
            height: 10px;
            background-color: #ddd;
            overflow: hidden;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease-in-out;
        }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: var(--accent-color);
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        input[type="radio"], input[type="text"] {
            margin-right: 10px;
        }

        .answer-correct {
            background-color: lightgreen !important;
        }

        .answer-wrong {
            background-color: pink !important;
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="progress-bar"></div>
    
    <!-- Блок с вопросами -->
    <div id="question-block">
        <p id="question-text">Вопрос:</p>
        <form id="quiz-form">
            <!-- Варианты ответов генерируются динамически -->
        </form>
    </div>

    <button id="next-btn">Далее</button>
    <button id="restart-btn" style="display:none;">Начать заново</button>
</div>

<script>
const questions = [
    {
        question: 'Кто написал роман «Тихий Дон»?',
        options: ['Михаил Шолохов', 'Антон Чехов', 'Лев Толстой'],
        answer: 'Михаил Шолохов'
    },
    {
        question: 'Назовите главную героиню произведения.',
        type: 'input',
        answer: 'Аксинья'
    },
    {
        question: 'Соотнесите героев и их судьбы:',
        type: 'matching',
        pairs: [['Григорий Мелехов', 'Не нашел покоя'], ['Екатерина Листницкая', 'Погибла в бою']]
    },
    // Остальные вопросы...
];

let currentQuestionIndex = 0;
let score = 0;

function updateProgressBar() {
    const progressWidth = ((currentQuestionIndex + 1) / questions.length) * 100;
    document.querySelector('.progress-bar::before').style.width = `${progressWidth}%`;
}

function renderQuestion() {
    const block = document.getElementById('question-block');
    const form = document.getElementById('quiz-form');
    form.innerHTML = ''; // Очищаем форму

    const q = questions[currentQuestionIndex];
    document.getElementById('question-text').innerText = q.question;

    switch (q.type) {
        case 'input':
            form.innerHTML += `<input type="text" placeholder="Ваш ответ"><br><span></span>`; // span для подсказки
            break;
        case 'matching':
            let keys = Object.keys(q.pairs);
            keys.forEach(key => {
                form.innerHTML += `
                    <label>${key}</label>
                    <select data-key="${key}">
                        ${Object.values(q.pairs).map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                    </select>
                `;
            });
            break;
        default: // radio
            q.options.forEach(opt => {
                form.innerHTML += `
                    <label>
                        <input type="radio" name="answer" value="${opt}" required>
                        ${opt}
                    </label><br>
                `;
            });
    }

    updateProgressBar();
}

document.getElementById('next-btn').addEventListener('click', () => {
    const q = questions[currentQuestionIndex];
    let userAnswer;

    if (q.type === 'input') {
        userAnswer = document.querySelector('#quiz-form input').value.trim();
    } else if (q.type === 'matching') {
        const selects = Array.from(document.querySelectorAll('#quiz-form select'));
        const answers = {};
        selects.forEach(sel => answers[sel.dataset.key] = sel.value);
        userAnswer = JSON.stringify(answers);
    } else {
        userAnswer = document.querySelector('input[name="answer"]:checked').value;
    }

    if (userAnswer !== undefined && userAnswer !== '') {
        if (JSON.stringify(userAnswer) === JSON.stringify(q.answer)) {
            score++;
            alert('✅ Верно!');
        } else {
            alert(`❌ Неверно. Правильный ответ: ${q.answer}`);
        }

        currentQuestionIndex++;

        if (currentQuestionIndex >= questions.length) {
            finishQuiz();
        } else {
            renderQuestion();
        }
    }
});

function finishQuiz() {
    const percent = Math.round(score / questions.length * 100);
    alert(`
🎯 Тест пройден!
Правильные ответы: ${score}/${questions.length}
Процент: ${percent}%
`);

    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('restart-btn').style.display = 'block';
}

document.getElementById('restart-btn').addEventListener('click', restartQuiz);

function restartQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    renderQuestion();
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('restart-btn').style.display = 'none';
}

renderQuestion(); // Первая загрузка
</script>
</body>
</html>
